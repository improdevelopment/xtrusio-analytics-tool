services:
  xtrusio-db:
    image: mariadb:10.11
    container_name: xtrusio-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - xtrusio-network

  matomo:
    build: .
    container_name: xtrusio-app
    restart: always
    depends_on:
      xtrusio-db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      MYSQL_HOST: xtrusio-db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./config:/var/www/html/config
      - ./tmp:/var/www/html/tmp
      - ./misc:/var/www/html/misc
    networks:
      - xtrusio-network

volumes:
  db_data:

networks:
  xtrusio-network:
    driver: bridge
