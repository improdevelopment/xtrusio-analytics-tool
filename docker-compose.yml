services:
  matomo-db:
    image: mariadb:10.11
    container_name: imapro-analytics-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: imapro_root_2024
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: imapro_matomo_2024
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - imapro-network

  matomo:
    build: .
    container_name: imapro-analytics
    restart: always
    depends_on:
      - matomo-db
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    command: >
      bash -c "
      mkdir -p /var/www/html/tmp/assets /var/www/html/tmp/cache /var/www/html/tmp/logs /var/www/html/tmp/tcpdf /var/www/html/tmp/templates_c /var/www/html/config /var/www/html/misc;
      chown -R www-data:www-data /var/www/html/config /var/www/html/tmp /var/www/html/misc;
      chmod -R 775 /var/www/html/config /var/www/html/tmp /var/www/html/misc;
      apache2-foreground
      "
    networks:
      - imapro-network

volumes:
  db_data:

networks:
  imapro-network:
    driver: bridge
